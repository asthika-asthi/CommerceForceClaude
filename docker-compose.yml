services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/commerceforce.db
      CORS_ORIGINS: "http://${SERVER_IP}:3000,http://${SERVER_IP}:3001,http://localhost:3000,http://localhost:3001"
      STOREFRONT_URL: "http://${SERVER_IP}:3000"
      ADMIN_URL: "http://${SERVER_IP}:3001"
    ports:
      - "8000:8000"
    volumes:
      - cf_data:/app/data
      - cf_uploads:/app/uploads

  frontend-starter:
    build:
      context: ./frontend-starter
      args:
        NEXT_PUBLIC_API_URL: "http://${SERVER_IP}:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        NEXT_PUBLIC_API_URL: "http://${SERVER_IP}:8000"
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  cf_data:
  cf_uploads:
