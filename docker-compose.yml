services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/commerceforce.db
      # Store currency (ISO code) — set CURRENCY_CODE in the root .env, default GBP.
      CURRENCY_CODE: "${CURRENCY_CODE:-GBP}"
      # CORS and URL values are set in backend/.env by generate-env.sh
    # In production, ports are NOT exposed directly — nginx handles external traffic.
    # Remove the port mapping below once nginx is set up and verified (single-client
    # setups only — on a shared multi-client VPS, leave it bound to 127.0.0.1, see
    # docs/multi-client-vps-setup.md).
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - cf_data:/app/data
      - ./uploads:/app/uploads

  frontend-starter:
    build:
      context: ./frontend-starter
      args:
        # Set by generate-env.sh: the HTTPS domain once one is configured
        # (Section 11), otherwise http://SERVER_IP:BACKEND_PORT for IP-only testing.
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL_STOREFRONT}"
        NEXT_PUBLIC_STOREFRONT_URL: "${NEXT_PUBLIC_STOREFRONT_URL}"
        NEXT_PUBLIC_CURRENCY_CODE: "${CURRENCY_CODE:-GBP}"
    # Port 3000 is accessed via nginx in production; exposed here for dev/fallback only
    ports:
      - "${STOREFRONT_PORT:-3000}:3000"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL_ADMIN}"
        NEXT_PUBLIC_CURRENCY_CODE: "${CURRENCY_CODE:-GBP}"
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    depends_on:
      - backend

  backup:
    image: alpine:3.19
    restart: unless-stopped
    volumes:
      - cf_data:/data:ro
      - cf_backups:/backups
      - ./scripts/docker-backup.sh:/usr/local/bin/run-backup:ro
    command: >
      /bin/sh -c "apk add --no-cache sqlite &&
        chmod +x /usr/local/bin/run-backup &&
        echo '0 2 * * * /usr/local/bin/run-backup >> /proc/1/fd/1 2>&1' | crontab - &&
        crond -f -l 8"
    depends_on:
      - backend

  # ── nginx: SSL termination + reverse proxy ─────────────────────────────────
  # Uncomment this service once DNS is pointing to the VPS and you have run certbot.
  # See docs/new-client-setup.md Section 11 — or just run scripts/setup-https.sh,
  # which does this uncommenting (and the rest of Section 11) for you.
  #
  # nginx:
  #   image: nginx:1.27-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     DOMAIN: "${DOMAIN}"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
  #     - ./nginx/entrypoint.sh:/docker-entrypoint.d/40-envsubst-on-templates.sh:ro
  #     - cf_letsencrypt:/etc/letsencrypt:ro
  #     - cf_certbot_www:/var/www/certbot:ro
  #   depends_on:
  #     - backend
  #     - frontend-starter
  #     - frontend-admin
  #   restart: unless-stopped
  #
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - cf_letsencrypt:/etc/letsencrypt
  #     - cf_certbot_www:/var/www/certbot
  #   # No entrypoint/command override on purpose — `docker compose run --rm
  #   # certbot <args>` (e.g. `renew`, or `certonly --webroot ...`) then runs
  #   # certbot's own image entrypoint directly with your args. A fixed custom
  #   # entrypoint here (e.g. a sleep loop) would silently swallow `run`'s
  #   # arguments instead of executing them — `docker compose up` just leaves
  #   # this container exited (code 0) between manual/cron `run` invocations,
  #   # which is expected for a one-shot utility service, not a bug.

volumes:
  cf_data:
  cf_backups:
  # Uncomment when nginx service is enabled:
  # cf_letsencrypt:
  # cf_certbot_www:
